name: Unit Tests

on:
  workflow_dispatch:

  push:
    paths:
      - "bin/**"
      - "package*.json"
      - "workers/**"
      - "lib/**"
      - "cdk.json"
      - "tsconfig.json"

    branches-ignore:
      - main
      - dev

jobs:
  secret-scanning:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Run secret scanning
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  unit-test:
    needs: [secret-scanning]
    permissions:
      id-token: write
      contents: read
    runs-on: ubuntu-latest
    environment:
      name: development

    env:
      NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
      FRONTEND_DOMAIN_URL: ${{ secrets.FRONTEND_DOMAIN_URL }}
      BACKEND_WEBHOOK_URL: ${{ secrets.BACKEND_WEBHOOK_URL }}
      REPO_OWNER: ${{ github.repository_owner }}
      REPO_NAME: ${{ github.event.repository.name }}
      CLOUDFRONT_DOMAIN_NAME: ${{ secrets.CLOUDFRONT_DOMAIN_NAME }}
      CLOUDFRONT_DOMAIN_CERTIFICATE_ARN: ${{ secrets.CLOUDFRONT_DOMAIN_CERTIFICATE_ARN }}
      CLOUDFRONT_PUBLIC_KEY_BASE64: ${{ secrets.CLOUDFRONT_PUBLIC_KEY_BASE64 }}
      CLOUDFLARE_BYPASS_SECRET: ${{ secrets.CLOUDFLARE_BYPASS_SECRET }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_ARN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Run Synth
        run: npx cdk synth

      - name: Stack Changes
        run: npx cdk diff

  notify:
    name: Notify Discord
    runs-on: ubuntu-latest
    needs: [secret-scanning, unit-test]
    if: always()
    steps:
      - name: Send Discord Notification
        uses: sarisia/actions-status-discord@v1.16.0
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ needs.secret-scanning.result != 'failure' && needs.unit-test.result == 'success' && 'success' || 'failure' }}
          title: Unit Test Results
          description: |
            **Commit:** ${{ github.event.head_commit.message }}
            **Triggered by:** ${{ github.actor }}
            **Branch:** ${{ github.ref_name }}
            **Repository:** ${{ github.repository }}
          url: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          username: GitHub Actions
          avatar_url: https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png
